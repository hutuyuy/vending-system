{% extends 'recognition/base.html' %}
{% block content %}
<div class="checkout-grid">

    <div class="card fade-in">
        <h2 style="margin-bottom:16px;">📷 商品识别</h2>

        <!-- 识别模式切换 -->
        <div style="display:flex; gap:8px; margin-bottom:14px;">
            <button class="btn btn-primary" id="modeCamera" onclick="switchMode('camera')" style="flex:1;">
                📷 拍照识别
            </button>
            <button class="btn btn-ghost" id="modeBarcode" onclick="switchMode('barcode')" style="flex:1;">
                🔲 扫码识别
            </button>
        </div>

        <!-- 摄像头区域 -->
        <div id="cameraSection">
            <div style="background:rgba(0,0,0,0.4); border-radius:14px; overflow:hidden; position:relative; aspect-ratio:4/3; border:1px solid var(--glass-border);">
                <video id="video" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <div id="ph" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text-muted);">
                    <div style="font-size:48px;margin-bottom:8px;">📷</div>
                    <p>点击下方按钮开启摄像头</p>
                </div>
            </div>
            <div style="margin-top:14px;display:flex;gap:10px;">
                <button class="btn btn-primary" onclick="startCamera()" style="flex:1;">开启摄像头</button>
                <button class="btn btn-success" onclick="capture()" style="flex:1;">📸 拍照识别</button>
            </div>
            <!-- 多图识别 -->
            <div style="margin-top:10px;display:flex;gap:10px;">
                <button class="btn btn-ghost" onclick="captureMulti()" style="flex:1;">
                    📸📸 多角度拍3张
                </button>
                <label class="btn btn-ghost" style="flex:1;cursor:pointer;text-align:center;">
                    📁 上传图片
                    <input type="file" accept="image/*" multiple onchange="handleFileUpload(event)" style="display:none;">
                </label>
            </div>
        </div>

        <!-- 扫码区域 -->
        <div id="barcodeSection" style="display:none;">
            <div style="background:rgba(0,0,0,0.4); border-radius:14px; overflow:hidden; position:relative; aspect-ratio:4/3; border:1px solid var(--glass-border);">
                <video id="barcodeVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
                <canvas id="barcodeCanvas" style="display:none;"></canvas>
                <!-- 扫码框指示 -->
                <div id="scanOverlay" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                    width:70%;height:30%;border:2px solid #22c55e;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4);">
                    <div style="position:absolute;top:-2px;left:0;width:30px;height:4px;background:#22c55e;border-radius:2px;"></div>
                    <div style="position:absolute;top:-2px;right:0;width:30px;height:4px;background:#22c55e;border-radius:2px;"></div>
                    <div style="position:absolute;bottom:-2px;left:0;width:30px;height:4px;background:#22c55e;border-radius:2px;"></div>
                    <div style="position:absolute;bottom:-2px;right:0;width:30px;height:4px;background:#22c55e;border-radius:2px;"></div>
                </div>
                <div id="barcodePH" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text-muted);">
                    <div style="font-size:48px;margin-bottom:8px;">🔲</div>
                    <p>将条形码/二维码对准框内</p><p style="font-size:12px;margin-top:4px;opacity:0.7;">💡 条码距离镜头 15-30cm，保持稳定</p>
                </div>
            </div>
            <div style="margin-top:14px;display:flex;gap:10px;">
                <button class="btn btn-primary" onclick="startBarcodeCamera()" style="flex:1;">开启摄像头</button>
                <button class="btn btn-success" onclick="scanBarcode()" style="flex:1;">🔍 扫码识别</button>
            </div>
            <!-- 手动输入条码 -->
            <div style="margin-top:10px;display:flex;gap:10px;">
                <input type="text" id="manualBarcode" placeholder="手动输入条形码..."
                    style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.3);color:var(--text);font-size:14px;">
                <button class="btn btn-ghost" onclick="manualBarcodeSubmit()">查询</button>
            </div>
        </div>

        <div id="result" style="margin-top:14px;"></div>
    </div>

    <div class="card fade-in fade-in-d1">
        <h2 style="margin-bottom:16px;">🧾 购物车</h2>
        <div id="cart">
            <div style="text-align:center;padding:50px 0;color:var(--text-muted);">
                <div style="font-size:48px;margin-bottom:8px;">🛒</div>
                <p>购物车为空，请先识别商品</p>
            </div>
        </div>
        <div id="totalArea" style="display:none;border-top:1px solid var(--glass-border);padding-top:16px;margin-top:16px;">
            <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:700;">
                <span>总计</span>
                <span id="totalPrice" style="color:#f472b6;">¥0.00</span>
            </div>
            <button class="btn btn-success" onclick="doCheckout()" style="width:100%;margin-top:14px;padding:14px;font-size:15px;">
                ✅ 确认结算
            </button>
        </div>
        <button class="btn btn-ghost" onclick="cart=[];renderCart()" style="width:100%;margin-top:10px;">🗑️ 清空购物车</button>
    </div>
</div>

<!-- 结算成功弹窗 -->
<div class="modal-overlay" id="successModal">
    <div class="modal" style="text-align:center; padding:40px;">
        <div style="font-size:64px; margin-bottom:16px;">✅</div>
        <h3 style="font-size:22px; margin-bottom:8px;">结算成功！</h3>
        <p id="orderNoText" style="color:var(--text-muted); font-size:14px; margin-bottom:4px;"></p>
        <p id="orderTotalText" style="font-size:28px; font-weight:700; color:#f472b6; margin:16px 0;"></p>
        <div id="orderItemsList" style="text-align:left; margin:16px 0;"></div>
        <div style="display:flex; gap:10px; margin-top:24px;">
            <a href="{% url 'recognition:order_history' %}" class="btn btn-ghost" style="flex:1;">📋 查看订单</a>
            <button class="btn btn-primary" onclick="closeSuccessModal()" style="flex:1;">继续识别</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let video, canvas, stream;
let barcodeVideo, barcodeCanvas, barcodeStream;
let cart = [];
let currentMode = 'camera';
let multiCaptureCount = 0;
let multiCapturePaths = [];

// ============================================================
//  模式切换
// ============================================================

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('cameraSection').style.display = mode === 'camera' ? 'block' : 'none';
    document.getElementById('barcodeSection').style.display = mode === 'barcode' ? 'block' : 'none';
    document.getElementById('modeCamera').className = mode === 'camera' ? 'btn btn-primary' : 'btn btn-ghost';
    document.getElementById('modeBarcode').className = mode === 'barcode' ? 'btn btn-primary' : 'btn btn-ghost';

    // 关闭另一个模式的摄像头
    if (mode === 'camera' && barcodeStream) {
        barcodeStream.getTracks().forEach(t => t.stop());
        barcodeStream = null;
    }
    if (mode === 'barcode' && stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }

    document.getElementById('result').innerHTML = '';
}

// ============================================================
//  摄像头识别
// ============================================================

function startCamera() {
    video = document.getElementById('video');
    canvas = document.getElementById('canvas');
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 },
        }
    })
        .then(mediaStream => {
            stream = mediaStream;
            video.srcObject = stream;
            document.getElementById('ph').style.display = 'none';
        })
        .catch(err => {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ 摄像头无法开启：' + err.message +
                '<br><span style="font-size:13px;opacity:.8">请检查浏览器权限或使用文件上传</span></div>';
        });
}

function capture() {
    if (!stream) return alert('请先开启摄像头');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
        doRecognize([blob]);
    }, 'image/jpeg');
}

// 多角度拍3张
function captureMulti() {
    if (!stream) return alert('请先开启摄像头');
    if (multiCaptureCount === 0) {
        multiCaptureCount = 0;
        multiCapturePaths = [];
        document.getElementById('result').innerHTML =
            '<div style="color:var(--accent);">📸 拍第 1/3 张（正面），请调整角度后点击继续...</div>' +
            '<button class="btn btn-primary" onclick="_doMultiCapture()" style="margin-top:8px;">📸 拍摄</button>';
        multiCaptureCount = 1;
    }
}

function _doMultiCapture() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        multiCapturePaths.push(blob);
        if (multiCapturePaths.length < 3) {
            const angles = ['正面', '侧面', '斜角'];
            document.getElementById('result').innerHTML =
                '<div style="color:var(--accent);">📸 已拍 ' + multiCapturePaths.length + '/3 张，请转到' +
                angles[multiCapturePaths.length] + '后点击继续...</div>' +
                '<button class="btn btn-primary" onclick="_doMultiCapture()" style="margin-top:8px;">📸 拍摄</button>';
        } else {
            document.getElementById('result').innerHTML = '<p style="color:var(--accent);">🔄 多图识别中...</p>';
            doRecognize(multiCapturePaths);
            multiCaptureCount = 0;
            multiCapturePaths = [];
        }
    }, 'image/jpeg');
}

// 文件上传（支持多选）
function handleFileUpload(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;
    const blobs = files.map(f => f);
    document.getElementById('result').innerHTML =
        '<p style="color:var(--accent);">🔄 识别中（' + blobs.length + ' 张图片）...</p>';
    doRecognize(blobs);
    event.target.value = '';
}

// ============================================================
//  条码识别
// ============================================================

function startBarcodeCamera() {
    barcodeVideo = document.getElementById('barcodeVideo');
    barcodeCanvas = document.getElementById('barcodeCanvas');
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: 'continuous',
            torch: false,
        }
    })
        .then(mediaStream => {
            barcodeStream = mediaStream;
            barcodeVideo.srcObject = barcodeStream;
            document.getElementById('barcodePH').style.display = 'none';
            // 尝试开启闪光灯（部分手机支持）
            const track = mediaStream.getVideoTracks()[0];
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            if (capabilities.torch) {
                track.applyConstraints({ advanced: [{ torch: true }] }).catch(() => {});
            }
        })
        .catch(err => {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ 摄像头无法开启：' + err.message + '</div>';
        });
}

function scanBarcode() {
    if (!barcodeStream) return alert('请先开启摄像头');
    barcodeCanvas.width = barcodeVideo.videoWidth;
    barcodeCanvas.height = barcodeVideo.videoHeight;
    barcodeCanvas.getContext('2d').drawImage(barcodeVideo, 0, 0);
    barcodeCanvas.toBlob(blob => {
        doBarcodeScan(blob);
    }, 'image/jpeg');
}

function manualBarcodeSubmit() {
    const code = document.getElementById('manualBarcode').value.trim();
    if (!code) return;
    // 直接用条码内容查商品
    doBarcodeLookup(code);
}

function doBarcodeScan(blob) {
    const formData = new FormData();
    formData.append('image', blob, 'barcode.jpg');
    document.getElementById('result').innerHTML = '<p style="color:var(--accent);">🔍 扫码中...</p>';

    fetch('/api/barcode/', {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            addToCart(data.product_name, +data.price);
            document.getElementById('result').innerHTML =
                '<div class="msg-success">✅ 扫码成功：<strong>' + data.product_name +
                '</strong>（条码：' + data.code + '）</div>';
        } else if (data.need_bind) {
            // 扫码成功但未匹配 → 弹出商品选择绑定
            showBindUI(data.code, data.products);
        } else {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ ' + data.message + '</div>';
        }
    })
    .catch(err => {
        document.getElementById('result').innerHTML =
            '<div class="msg-error">❌ ' + err.message + '</div>';
    });
}

function showBindUI(code, products) {
    let options = '<option value="">-- 请选择商品 --</option>';
    products.forEach(p => {
        options += '<option value="' + p.id + '">' + p.name + '（¥' + parseFloat(p.price).toFixed(2) + '）</option>';
    });
    document.getElementById('result').innerHTML =
        '<div style="background:rgba(99,102,241,0.1);border:1px solid var(--glass-border);border-radius:12px;padding:16px;margin-top:8px;">' +
        '<p style="font-weight:600;margin-bottom:10px;">🔗 扫码成功！条码：<code>' + code + '</code></p>' +
        '<p style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">未找到对应商品，请选择绑定：</p>' +
        '<select id="bindProductSelect" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.3);color:var(--text);font-size:14px;margin-bottom:10px;">' +
        options + '</select>' +
        '<button class="btn btn-success" onclick="doBind(\'' + code + '\')" style="width:100%;">✅ 确认绑定并加入购物车</button>' +
        '</div>';
}

function doBind(code) {
    const select = document.getElementById('bindProductSelect');
    const productId = select.value;
    if (!productId) return alert('请先选择商品');

    fetch('/api/barcode/bind/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ code: code, product_id: parseInt(productId) })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            addToCart(data.product_name, +data.price);
            document.getElementById('result').innerHTML =
                '<div class="msg-success">✅ 绑定成功！已将 <strong>' + data.product_name +
                '</strong> 加入购物车（条码：' + code + '）</div>';
        } else {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ ' + data.message + '</div>';
        }
    })
    .catch(err => {
        document.getElementById('result').innerHTML =
            '<div class="msg-error">❌ 绑定失败：' + err.message + '</div>';
    });
}

function doBarcodeLookup(code) {
    document.getElementById('result').innerHTML = '<p style="color:var(--accent);">🔍 查询中...</p>';
    // 直接查数据库 barcode 字段
    fetch('/api/barcode/lookup/?code=' + encodeURIComponent(code))
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            addToCart(data.product_name, +data.price);
            document.getElementById('result').innerHTML =
                '<div class="msg-success">✅ 查询成功：<strong>' + data.product_name + '</strong></div>';
        } else if (data.need_bind) {
            showBindUI(code, data.products);
        } else {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ ' + data.message + '</div>';
        }
    })
    .catch(err => {
        document.getElementById('result').innerHTML =
            '<div class="msg-error">❌ 查询失败：' + err.message + '</div>';
    });
}

// ============================================================
//  识别核心
// ============================================================

function doRecognize(blobs) {
    const formData = new FormData();
    blobs.forEach((blob, i) => {
        formData.append('image', blob, `capture_${i}.jpg`);
    });

    fetch('/api/recognize/', {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            addToCart(data.product_name, +data.price);
            let extra = '';
            if (data.image_count) extra = '（' + data.image_count + ' 张图综合判断）';
            if (data.stock !== undefined) extra += ' | 库存: ' + data.stock;
            document.getElementById('result').innerHTML =
                '<div class="msg-success">✅ 识别成功：<strong>' + data.product_name +
                '</strong>（置信度：' + (data.confidence * 100).toFixed(1) + '%）' + extra + '</div>';
        } else {
            const hint = data.top_guess
                ? '<br><span style="font-size:13px;opacity:.8">最接近的猜测：' + data.top_guess +
                  '（' + (data.confidence * 100).toFixed(1) + '%）</span>'
                : '';
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ ' + data.message + hint + '</div>';
        }
    })
    .catch(err => {
        document.getElementById('result').innerHTML =
            '<div class="msg-error">❌ ' + err.message + '</div>';
    });
}

// ============================================================
//  购物车（不变）
// ============================================================

function addToCart(name, price) {
    const existing = cart.find(item => item.name === name);
    if (existing) existing.qty++;
    else cart.push({ name, price, qty: 1 });
    renderCart();
}

function renderCart() {
    const cartEl = document.getElementById('cart');
    const totalArea = document.getElementById('totalArea');
    if (!cart.length) {
        cartEl.innerHTML = '<div style="text-align:center;padding:50px 0;color:var(--text-muted)">' +
            '<div style="font-size:48px">🛒</div><p>购物车为空</p></div>';
        totalArea.style.display = 'none';
        return;
    }
    let html = '<table><thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th><th></th></tr></thead><tbody>';
    let total = 0;
    cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        html += '<tr><td style="font-weight:600">' + item.name + '</td>' +
            '<td>¥' + item.price.toFixed(2) + '</td>' +
            '<td style="text-align:center">' +
            '<button onclick="changeQty(' + index + ',-1)" style="background:none;border:1px solid var(--glass-border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer">-</button>' +
            '<span style="margin:0 8px;font-weight:600">' + item.qty + '</span>' +
            '<button onclick="changeQty(' + index + ',1)" style="background:none;border:1px solid var(--glass-border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer">+</button></td>' +
            '<td style="font-weight:700;color:#f472b6">¥' + subtotal.toFixed(2) + '</td>' +
            '<td><button onclick="removeItem(' + index + ')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">✕</button></td></tr>';
    });
    html += '</tbody></table>';
    cartEl.innerHTML = html;
    document.getElementById('totalPrice').textContent = '¥' + total.toFixed(2);
    totalArea.style.display = 'block';
}

function changeQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function doCheckout() {
    if (!cart.length) return alert('购物车为空');
    fetch('/api/checkout/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ items: cart })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById('orderNoText').textContent = '订单号：' + data.order_no;
            document.getElementById('orderTotalText').textContent = '¥' + data.total.toFixed(2);
            let itemsHtml = '';
            data.items.forEach(item => {
                itemsHtml += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(99,102,241,0.06);font-size:14px;">' +
                    '<span>' + item.name + ' x' + item.qty + '</span>' +
                    '<span style="font-weight:600;color:#f472b6;">¥' + item.subtotal.toFixed(2) + '</span></div>';
            });
            document.getElementById('orderItemsList').innerHTML = itemsHtml;
            document.getElementById('successModal').classList.add('show');
            cart = [];
            renderCart();
        } else {
            alert(data.message || '结算失败');
        }
    })
    .catch(err => alert('结算请求失败: ' + err.message));
}

function closeSuccessModal() {
    document.getElementById('successModal').classList.remove('show');
}
</script>
{% endblock %}
