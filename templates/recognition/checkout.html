{% extends 'recognition/base.html' %}
{% block content %}
<div class="checkout-grid">

    <div class="card fade-in">
        <h2 style="margin-bottom:16px;">📷 商品识别</h2>
        <div style="background:rgba(0,0,0,0.4); border-radius:14px; overflow:hidden; position:relative; aspect-ratio:4/3; border:1px solid var(--glass-border);">
            <video id="video" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="ph" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text-muted);">
                <div style="font-size:48px;margin-bottom:8px;">📷</div>
                <p>点击下方按钮开启摄像头</p>
            </div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="startCamera()" style="flex:1;">开启摄像头</button>
            <button class="btn btn-success" onclick="capture()" style="flex:1;">📸 拍照识别</button>
        </div>
        <div id="result" style="margin-top:14px;"></div>
    </div>

    <div class="card fade-in fade-in-d1">
        <h2 style="margin-bottom:16px;">🧾 购物车</h2>
        <div id="cart">
            <div style="text-align:center;padding:50px 0;color:var(--text-muted);">
                <div style="font-size:48px;margin-bottom:8px;">🛒</div>
                <p>购物车为空，请先识别商品</p>
            </div>
        </div>
        <div id="totalArea" style="display:none;border-top:1px solid var(--glass-border);padding-top:16px;margin-top:16px;">
            <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:700;">
                <span>总计</span>
                <span id="totalPrice" style="color:#f472b6;">¥0.00</span>
            </div>
            <button class="btn btn-success" onclick="doCheckout()" style="width:100%;margin-top:14px;padding:14px;font-size:15px;">
                ✅ 确认结算
            </button>
        </div>
        <button class="btn btn-ghost" onclick="cart=[];renderCart()" style="width:100%;margin-top:10px;">🗑️ 清空购物车</button>
    </div>
</div>

<!-- 结算成功弹窗 -->
<div class="modal-overlay" id="successModal">
    <div class="modal" style="text-align:center; padding:40px;">
        <div style="font-size:64px; margin-bottom:16px;">✅</div>
        <h3 style="font-size:22px; margin-bottom:8px;">结算成功！</h3>
        <p id="orderNoText" style="color:var(--text-muted); font-size:14px; margin-bottom:4px;"></p>
        <p id="orderTotalText" style="font-size:28px; font-weight:700; color:#f472b6; margin:16px 0;"></p>
        <div id="orderItemsList" style="text-align:left; margin:16px 0;"></div>
        <div style="display:flex; gap:10px; margin-top:24px;">
            <a href="{% url 'recognition:order_history' %}" class="btn btn-ghost" style="flex:1;">📋 查看订单</a>
            <button class="btn btn-primary" onclick="closeSuccessModal()" style="flex:1;">继续识别</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let video, canvas, stream, cart = [];

function startCamera() {
    video = document.getElementById('video');
    canvas = document.getElementById('canvas');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(mediaStream => {
            stream = mediaStream;
            video.srcObject = stream;
            document.getElementById('ph').style.display = 'none';
        })
        .catch(err => {
            document.getElementById('result').innerHTML =
                '<div class="msg-error">❌ 摄像头无法开启：' + err.message +
                '<br><span style="font-size:13px;opacity:.8">请检查浏览器权限或使用文件上传</span></div>';
        });
}

function capture() {
    if (!stream) return alert('请先开启摄像头');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('image', blob, 'capture.jpg');
        document.getElementById('result').innerHTML = '<p style="color:var(--accent)">🔄 识别中...</p>';
        fetch('/api/recognize/', { method: 'POST', body: formData, headers: { 'X-CSRFToken': getCookie('csrftoken') } })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addToCart(data.product_name, +data.price);
                    document.getElementById('result').innerHTML =
                        '<div class="msg-success">✅ 识别成功：<strong>' + data.product_name +
                        '</strong>（置信度：' + (data.confidence * 100).toFixed(1) + '%）</div>';
                } else {
                    const hint = data.top_guess
                        ? '<br><span style="font-size:13px;opacity:.8">最接近的猜测：' + data.top_guess +
                          '（' + (data.confidence * 100).toFixed(1) + '%）</span>'
                        : '';
                    document.getElementById('result').innerHTML =
                        '<div class="msg-error">❌ ' + data.message + hint + '</div>';
                }
            })
            .catch(err => {
                document.getElementById('result').innerHTML =
                    '<div class="msg-error">❌ ' + err.message + '</div>';
            });
    }, 'image/jpeg');
}

function addToCart(name, price) {
    const existing = cart.find(item => item.name === name);
    if (existing) existing.qty++;
    else cart.push({ name, price, qty: 1 });
    renderCart();
}

function renderCart() {
    const cartEl = document.getElementById('cart');
    const totalArea = document.getElementById('totalArea');
    if (!cart.length) {
        cartEl.innerHTML = '<div style="text-align:center;padding:50px 0;color:var(--text-muted)">' +
            '<div style="font-size:48px">🛒</div><p>购物车为空</p></div>';
        totalArea.style.display = 'none';
        return;
    }
    let html = '<table><thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th><th></th></tr></thead><tbody>';
    let total = 0;
    cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        html += '<tr><td style="font-weight:600">' + item.name + '</td>' +
            '<td>¥' + item.price.toFixed(2) + '</td>' +
            '<td style="text-align:center">' +
            '<button onclick="changeQty(' + index + ',-1)" style="background:none;border:1px solid var(--glass-border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer">-</button>' +
            '<span style="margin:0 8px;font-weight:600">' + item.qty + '</span>' +
            '<button onclick="changeQty(' + index + ',1)" style="background:none;border:1px solid var(--glass-border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer">+</button></td>' +
            '<td style="font-weight:700;color:#f472b6">¥' + subtotal.toFixed(2) + '</td>' +
            '<td><button onclick="removeItem(' + index + ')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">✕</button></td></tr>';
    });
    html += '</tbody></table>';
    cartEl.innerHTML = html;
    document.getElementById('totalPrice').textContent = '¥' + total.toFixed(2);
    totalArea.style.display = 'block';
}

function changeQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function doCheckout() {
    if (!cart.length) return alert('购物车为空');
    fetch('/api/checkout/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ items: cart })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // 显示成功弹窗
            document.getElementById('orderNoText').textContent = '订单号：' + data.order_no;
            document.getElementById('orderTotalText').textContent = '¥' + data.total.toFixed(2);
            let itemsHtml = '';
            data.items.forEach(item => {
                itemsHtml += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(99,102,241,0.06);font-size:14px;">' +
                    '<span>' + item.name + ' x' + item.qty + '</span>' +
                    '<span style="font-weight:600;color:#f472b6;">¥' + item.subtotal.toFixed(2) + '</span></div>';
            });
            document.getElementById('orderItemsList').innerHTML = itemsHtml;
            document.getElementById('successModal').classList.add('show');
            cart = [];
            renderCart();
        } else {
            alert('失败：' + data.message);
        }
    });
}

function closeSuccessModal() {
    document.getElementById('successModal').classList.remove('show');
}

window.addEventListener('beforeunload', () => {
    if (stream) stream.getTracks().forEach(track => track.stop());
});
</script>
{% endblock %}
