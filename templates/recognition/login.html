<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能售货系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #8b5cf6;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text: #1e1b4b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
            background: #f0eef6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 25%, #e0e7ff 50%, #f0f9ff 75%, #faf5ff 100%);
        }
        #bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: linear-gradient(180deg, rgba(245,243,255,0.2) 0%, rgba(224,231,255,0.3) 100%);
        }

        .glow-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1;
            animation: float 12s ease-in-out infinite; pointer-events: none;
        }
        .glow-orb.orb1 { width: 600px; height: 600px; background: rgba(139,92,246,0.12); top: -200px; left: -200px; }
        .glow-orb.orb2 { width: 500px; height: 500px; background: rgba(99,102,241,0.1); bottom: -150px; right: -150px; animation-delay: -6s; }
        .glow-orb.orb3 { width: 400px; height: 400px; background: rgba(168,85,247,0.08); top: 40%; left: 30%; animation-delay: -3s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* Login Card */
        .login-card {
            width: 420px; max-width: 90%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 24px 80px rgba(99, 102, 241, 0.12), 0 4px 24px rgba(0,0,0,0.06);
            animation: fadeInUp 0.7s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            text-align: center; margin-bottom: 8px;
        }
        .login-logo .icon {
            width: 64px; height: 64px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }
        .login-logo h1 {
            font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-logo p {
            font-size: 14px; color: var(--text-muted); margin-top: 6px;
        }

        .form-group {
            margin-top: 24px;
        }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text); margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(99, 102, 241, 0.04);
            border: 1.5px solid rgba(99, 102, 241, 0.12);
            border-radius: 12px;
            color: var(--text); font-size: 15px; font-family: inherit;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: rgba(99, 102, 241, 0.06);
        }
        .form-group input::placeholder {
            color: #a5b4c8;
        }

        .login-btn {
            width: 100%; margin-top: 28px;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 12px;
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.45);
        }
        .login-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .error-msg {
            margin-top: 16px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .login-footer {
            text-align: center; margin-top: 24px;
            font-size: 12px; color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 20px;
            }
            .login-logo .icon { width: 56px; height: 56px; font-size: 28px; }
            .login-logo h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div id="bg-overlay"></div>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="glow-orb orb3"></div>

    <div class="login-card">
        <div class="login-logo">
            <div class="icon">◈</div>
            <h1>智能售货系统</h1>
            <p>请登录以继续使用</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'recognition:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">登 录</button>
        </form>

        <div class="login-footer">智能售货系统 v1.0 · 安全登录</div>
    </div>
</body>
</html>
