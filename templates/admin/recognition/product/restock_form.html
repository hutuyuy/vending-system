{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <input type="hidden" name="action" value="restock_action">
    {% for product in products %}
    <input type="hidden" name="_selected_action" value="{{ product.pk }}">
    {% endfor %}
    <input type="hidden" name="apply" value="1">

    <fieldset class="module aligned">
        <h2>为以下商品补货</h2>
        <ul>
            {% for product in products %}
            <li><strong>{{ product.name }}</strong> — 当前库存: {{ product.stock }}</li>
            {% endfor %}
        </ul>

        <div class="form-row">
            <label for="quantity">补货数量：</label>
            <input type="number" name="quantity" id="quantity" value="10" min="1" required>
        </div>

        <div class="form-row">
            <label for="note">备注：</label>
            <input type="text" name="note" id="note" placeholder="可选">
        </div>
    </fieldset>

    <div class="submit-row">
        <input type="submit" value="确认补货" class="default">
    </div>
</form>
{% endblock %}
